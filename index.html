        :root {
            --bg-deep: #05070a;
            --accent: #6366f1;

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-hover:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.8s ease forwards; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .nav-link {
            position: relative;
            cursor: pointer;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }

        .badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent-light);

    <script>
        // State Management & Router
        function showView(viewId) {
            const container = document.getElementById('view-container');
            const template = document.getElementById(`view-${viewId}`).innerHTML;
            
            // Fade out
            container.style.opacity = '0';
            
            setTimeout(() => {
                container.innerHTML = template;
                lucide.createIcons();
                window.scrollTo(0, 0);
                container.style.opacity = '1';
                container.classList.add('animate-in');
            }, 200);
        }

        function scrollToId(id) {
            if (document.getElementById(id)) {
                document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
            } else {
                // If on a project page, return home then scroll
                showView('home');
                setTimeout(() => scrollToId(id), 300);
            }
        }

        // Initialize
        window.onload = () => {
            showView('home');
        };
    </script>
